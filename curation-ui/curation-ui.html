<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KulPik Auto-Curation Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .status-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .status-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            background: #667eea;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #ed8936 100%);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .results-section {
            margin-top: 20px;
        }

        .result-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .laptop-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            overflow: hidden;
        }

        .laptop-table th {
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: 500;
            text-align: left;
        }

        .laptop-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }

        .alert-success {
            background: rgba(72, 187, 120, 0.2);
            border: 1px solid rgba(72, 187, 120, 0.4);
        }

        .alert-error {
            background: rgba(249, 115, 115, 0.2);
            border: 1px solid rgba(249, 115, 115, 0.4);
        }

        .alert-info {
            background: rgba(66, 153, 225, 0.2);
            border: 1px solid rgba(66, 153, 225, 0.4);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-laptop"></i>
                <span>KulPik Auto-Curation Dashboard</span>
            </div>
            <button class="btn btn-primary" onclick="refreshStatus()">
                <i class="fas fa-sync-alt"></i>
                Refresh Status
            </button>
        </div>

        <div class="card">
            <h2>System Status</h2>
            <div id="status-content"></div>
        </div>

        <div class="card">
            <h2>Auto Curation</h2>
            
            <div class="form-group">
                <label class="form-label">Number of laptops to curate</label>
                <input type="number" id="num-laptops" class="form-input" value="30" min="5" max="100">
            </div>

            <div class="form-group">
                <label class="form-label">Search queries (comma separated)</label>
                <textarea id="queries" class="form-input" rows="3" placeholder="Best laptop for students, Gaming laptop budget, etc"></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="runCuration()">
                    <i class="fas fa-plus"></i>
                    Curate Laptops
                </button>
                <button class="btn" onclick="updateEmbeddings()">
                    <i class="fas fa-robot"></i>
                    Update Embeddings
                </button>
            </div>

            <div id="curation-progress" class="progress-bar" style="display: none;">
                <div class="progress-fill" style="width: 0%"></div>
            </div>

            <div id="curation-result" class="results-section"></div>
        </div>

        <div class="card">
            <h2>Manual Search</h2>
            
            <div class="form-group">
                <label class="form-label">Search query</checked>
                <input type="text" id="search-query" class="form-input" placeholder="Enter laptop search query">
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="searchLaptops()">
                    <i class="fas fa-search"></i>
                    Search via EXA
                </button>
                <button class="btn" onclick="addLaptop()">
                    <i class="fas fa-download"></i>
                    Add to Database
                </button>
            </div>

            <div id="search-results" class="results-section"></div>
        </div>

        <div class="card">
            <h2>Database</h2>
            
            <div class="btn-group">
                <button class="btn" onclick="loadLaptops()">
                    <i class="fas fa-database"></i>
                    Load Laptops
                </button>
                <button class="btn btn-danger" onclick="cleanDuplicates()">
                    <i class="fas fa-trash"></i>
                    Clean Duplicates
                </button>
            </div>

            <div id="laptop-list"></div>
        </div>

        <div class="footer">
            <p>KulPik Auto-Curation Dashboard • Powered by EXA + Cohere</p>
            <p>Backend API: http://localhost:5000/api/curation</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api/curation';

        function showAlert(type, message) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            
            const resultsSection = document.querySelector('.results-section');
            if (resultsSection) {
                resultsSection.appendChild(alert);
            } else {
                document.body.appendChild(alert);
            }
            
            setTimeout(() => alert.remove(), 5000);
        }

        function updateProgress(progress) {
            const progressBar = document.getElementById('curation-progress');
            const progressFill = progressBar.querySelector('.progress-fill');
            
            progressBar.style.display = 'block';
            progressFill.style.width = `${progress}%`;
        }

        function refreshStatus() {
            fetch(`${API_BASE_URL}/status`)
                .then(response => response.json())
                .then(data => {
                    const statusContent = document.getElementById('status-content');
                    
                    if (data.error) {
                        statusContent.innerHTML = `
                            <div class="alert alert-error">
                                <i class="fas fa-exclamation-circle"></i>
                                ${data.error}
                            </div>
                        `;
                        return;
                    }

                    statusContent.innerHTML = `
                        <div class="status-grid">
                            <div class="status-item">
                                <strong>EXA API</strong><br>
                                ${data.exa_available ? '<i class="fas fa-check-circle"></i> Available' : '<i class="fas fa-times-circle"></i> Not available'}
                            </div>
                            <div class="status-item">
                                <strong>Cohere API</strong><br>
                                ${data.cohere_available ? '<i class="fas fa-check-circle"></i> Available' : '<i class="fas fa-times-circle"></i> Not available'}
                            </div>
                            <div class="status-item">
                                <strong>Laptop Count</strong><br>
                                ${data.laptop_count || 0} laptops
                            </div>
                            <div class="status-item">
                                <strong>Embeddings</strong><br>
                                ${data.embedding_count || 0} embedded
                            </div>
                            <div class="status-item">
                                <strong>Timestamp</strong><br>
                                ${data.timestamp || 'Unknown'}
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    showAlert('error', `Failed to refresh status: ${error}`);
                });
        }

        function runCuration() {
            const numLaptops = document.getElementById('num-laptops').value;
            const queries = document.getElementById('queries').value.split(',').map(q => q.trim());

            fetch(`${API_BASE_URL}/bulk`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    num_laptops: parseInt(numLaptops),
                    queries: queries
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', `<i class="fas fa-check-circle"></i> ${data.message}`);
                        setTimeout(() => refreshStatus(), 2000);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to run curation: ${error}`);
                });

            updateProgress(10);
        }

        function updateEmbeddings() {
            const limit = document.getElementById('num-laptops').value || 100;

            fetch(`${API_BASE_URL}/update_embeddings`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    limit: parseInt(limit)
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', `<i class="fas fa-check-circle"></i> ${data.message}`);
                        setTimeout(() => refreshStatus(), 2000);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to update embeddings: ${error}`);
                });
        }

        function searchLaptops() {
            const query = document.getElementById('search-query').value;
            const limit = 10;

            if (!query) {
                showAlert('error', 'Please enter a search query');
                return;
            }

            fetch(`${API_BASE_URL}/search`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query: query,
                    limit: limit
                })
            })
                .then(response => response.json())
                .then(data => {
                    const resultsSection = document.getElementById('search-results');
                    
                    if (data.error) {
                        resultsSection.innerHTML = `
                            <div class="alert alert-error">
                                <i class="fas fa-exclamation-circle"></i>
                                ${data.error}
                            </div>
                        `;
                        return;
                    }

                    if (data.results && data.results.length > 0) {
                        resultsSection.innerHTML = `
                            <div class="alert alert-success">
                                <i class="fas fa-search"></i>
                                Found ${data.count} results for "${data.query}"
                            </div>
                        `;

                        data.results.forEach((result, index) => {
                            const resultDiv = document.createElement('div');
                            resultDiv.className = 'result-item';
                            resultDiv.innerHTML = `
                                <strong>${result.title || 'Unknown'}</strong><br>
                                <small>${result.url}</small>
                                <button class="btn btn-primary" onclick="extractLaptop('${JSON.stringify(result)}')">
                                    <i class="fas fa-magic"></i>
                                    Extract Specs
                                </button>
                            `;
                            resultsSection.appendChild(resultDiv);
                        });
                    } else {
                        resultsSection.innerHTML = `
                            <div class="alert alert-info">
                                <i class="fas fa-info-circle"></i>
                                No results found for "${data.query}"
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to search: ${error}`);
                });
        }

        function extractLaptop(result) {
            const query = document.getElementById('search-query').value;
            const brand = query.split(' ')[0];

            fetch(`${API_BASE_URL}/extract`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    result: JSON.parse(result),
                    brand: brand
                })
            })
                .then(response => response.json())
                .then(data => {
                    const resultsSection = document.getElementById('search-results');
                    
                    if (data.error) {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                        return;
                    }

                    if (data.extracted) {
                        const extractedDiv = document.createElement('div');
                        extractedDiv.className = 'alert alert-success';
                        extractedDiv.innerHTML = `
                            <i class="fas fa-magic"></i>
                            Specs extracted successfully<br>
                            <small>Name: ${data.extracted.full_name}</small><br>
                            <small>CPU: ${data.extracted.cpu}</small><br>
                            <small>RAM: ${data.extracted.ram_gb}GB</small><br>
                            <small>Storage: ${data.extracted.storage_gb}GB</small><br>
                            <button class="btn btn-primary" onclick="addLaptopToDB('${JSON.stringify(data.extracted)}')">
                                <i class="fas fa-save"></i>
                                Add to Database
                            </button>
                        `;
                        resultsSection.appendChild(extractedDiv);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> Could not extract specs`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to extract: ${error}`);
                });
        }

        function addLaptopToDB(laptop) {
            fetch(`${API_BASE_URL}/add`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    laptop: JSON.parse(laptop)
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', `<i class="fas fa-check-circle"></i> ${data.message}`);
                        setTimeout(() => refreshStatus(), 2000);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to add laptop: ${error}`);
                });
        }

        function loadLaptops() {
            const limit = 50;
            const offset = 0;

            fetch(`${API_BASE_URL}/laptops?limit=${limit}&offset=${offset}`)
                .then(response => response.json())
                .then(data => {
                    const laptopList = document.getElementById('laptop-list');
                    
                    if (data.error) {
                        laptopList.innerHTML = `
                            <div class="alert alert-error">
                                <i class="fas fa-exclamation-circle"></i>
                                ${data.error}
                            </div>
                        `;
                        return;
                    }

                    laptopList.innerHTML = `
                        <div class="alert alert-success">
                            <i class="fas fa-database"></i>
                            Loaded ${data.count} laptops
                        </div>
                    `;

                    if (data.laptops && data.laptops.length > 0) {
                        const table = document.createElement('table');
                        table.className = 'laptop-table';
                        
                        table.innerHTML = `
                            <tr>
                                <th>Name</th>
                                <th>Brand</th>
                                <th>RAM</th>
                                <th>Storage</th>
                                <th>Price</th>
                                <th>Embedding</th>
                                <th>Actions</th>
                            </tr>
                        `;

                        data.laptops.forEach(laptop => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${laptop.full_name || laptop.model}</td>
                                <td>${laptop.brand}</td>
                                <td>${laptop.ram_gb}GB ${laptop.ram_type}</td>
                                <td>${laptop.storage_gb}GB ${laptop.storage_type}</td>
                                <td>Rp ${laptop.price_tokopedia || laptop.price_shopee || laptop.price_official || 0}</td>
                                <td>${laptop.embedding ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteLaptop('${laptop.slug}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            `;
                            table.appendChild(row);
                        });

                        laptopList.appendChild(table);
                    } else {
                        laptopList.innerHTML += `
                            <div class="alert alert-info">
                                <i class="fas fa-info-circle"></i>
                                No laptops found in database
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to load laptops: ${error}`);
                });
        }

        function deleteLaptop(slug) {
            fetch(`${API_BASE_URL}/delete/${slug}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', `<i class="fas fa-check-circle"></i> ${data.message}`);
                        setTimeout(() => loadLaptops(), 1000);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to delete laptop: ${error}`);
                });
        }

        function cleanDuplicates() {
            fetch(`${API_BASE_URL}/clean`, {
                method: 'POST'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert('success', `<i class="fas fa-check-circle"></i> ${data.message}`);
                        setTimeout(() => loadLaptops(), 2000);
                    } else {
                        showAlert('error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                    }
                })
                .catch(error => {
                    showAlert('error', `Failed to clean duplicates: ${error}`);
                });
        }

        // Initial refresh
        refreshStatus();
    </script>
</body>
</html>
